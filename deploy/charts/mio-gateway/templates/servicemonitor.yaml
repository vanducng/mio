{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "mio-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mio-gateway.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "mio-gateway.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      # Metric labels contract: {channel_type, direction, outcome} only.
      # workspace/account_id labels are FORBIDDEN — cardinality explosion.
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_instance]
          targetLabel: release
{{- end }}
