apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mio-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mio-gateway.labels" . | nindent 4 }}
data:
  NATS_URL: {{ .Values.config.natsUrl | quote }}
  MIO_TENANT_ID: {{ .Values.config.tenantId | quote }}
  MIO_SCHEMA_VERSION_STRICT: {{ .Values.config.schemaVersionStrict | quote }}
  MIO_MIGRATE_ON_START: {{ .Values.config.migrateOnStart | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  METRICS_PORT: {{ .Values.config.metricsPort | quote }}
  HTTP_PORT: {{ .Values.config.httpPort | quote }}
