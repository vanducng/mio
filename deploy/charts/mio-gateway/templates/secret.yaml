{{- /*
  This template documents the expected Secret shape.
  For POC: create via setup.sh or kubectl before helm install.
  For prod: use External Secrets Operator + GCP Secret Manager.

  Required keys in Secret named {{ .Values.secrets.existingSecret }}:
    DATABASE_URL          — postgres connection string (private IP for POC)
    CLIQ_WEBHOOK_SECRET   — HMAC-SHA256 signing secret from Zoho Cliq bot config
    CLIQ_BOT_TOKEN        — OAuth token for outbound Cliq REST API calls
    CLIQ_BOT_SCOPE        — bot scope identifier (e.g. organization_id)

  DO NOT commit actual secret values to git.
  This file intentionally renders no K8s resource.
*/}}
