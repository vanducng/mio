apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "mio-gateway.fullname" . }}-migrate-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mio-gateway.labels" . | nindent 4 }}
  annotations:
    # Runs BEFORE any gateway pod starts — enforces single-writer for schema changes.
    # Gateway pods set MIO_MIGRATE_ON_START=false; they never run migrations.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "mio-gateway.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: migrate
          image: "{{ .Values.migration.image.registry }}/{{ .Values.migration.image.repository }}:{{ .Values.migration.image.tag }}"
          imagePullPolicy: {{ .Values.migration.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["/gateway", "migrate", "up"]
          # Pre-install hook fires before the ConfigMap exists, so envFrom
          # configMapRef would NotFound-loop. Inline the required envs from
          # .Values.config directly so the job is self-sufficient.
          env:
            - name: MIO_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: DATABASE_URL
            - name: MIO_TENANT_ID
              value: {{ .Values.config.tenantId | quote }}
            - name: MIO_ACCOUNT_ID
              value: {{ .Values.config.accountId | quote }}
            - name: MIO_NATS_URLS
              value: {{ .Values.config.natsUrl | quote }}
            - name: MIO_MIGRATE_ON_START
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
