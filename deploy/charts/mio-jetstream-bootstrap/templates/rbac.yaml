apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mio-jetstream-bootstrap.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mio-jetstream-bootstrap.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: before-hook-creation
automountServiceAccountToken: false
---
# Minimal Role: only needs to read ConfigMap we created above.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "mio-jetstream-bootstrap.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mio-jetstream-bootstrap.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["{{ include "mio-jetstream-bootstrap.fullname" . }}-spec"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mio-jetstream-bootstrap.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mio-jetstream-bootstrap.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mio-jetstream-bootstrap.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "mio-jetstream-bootstrap.fullname" . }}
    namespace: {{ .Release.Namespace }}
