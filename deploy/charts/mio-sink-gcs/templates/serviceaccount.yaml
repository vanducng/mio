{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mio-sink-gcs.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mio-sink-gcs.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.serviceAccount.gcpServiceAccount }}
    # Workload Identity: binds this KSA to the GCP service account.
    # GSA must have roles/storage.objectAdmin on the GCS bucket.
    # No static keys — GCE metadata service provides short-lived tokens.
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpServiceAccount | quote }}
    {{- end }}
automountServiceAccountToken: false
{{- end }}
