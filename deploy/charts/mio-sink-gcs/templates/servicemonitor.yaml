{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "mio-sink-gcs.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mio-sink-gcs.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "mio-sink-gcs.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      # Metric labels contract: {channel_type, direction, outcome} only.
{{- end }}
