{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mio-attachment-downloader.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mio-attachment-downloader.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.serviceAccount.gcpServiceAccount }}
    # Workload Identity binding — KSA → GSA. GSA must have:
    #   roles/storage.objectAdmin (scoped to mio/attachments/ via IAM Condition)
    #   roles/iam.serviceAccountTokenCreator on itself (V4 signed-URL signing)
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpServiceAccount | quote }}
    {{- end }}
automountServiceAccountToken: true
{{- end }}
