syntax = "proto3";

package mio.v1;

option go_package = "github.com/vanducng/mio/proto/gen/go/mio/v1;miov1";

// Attachment represents a file, image, link, or media item attached to a message.
message Attachment {
  // Kind classifies the attachment for rendering and routing decisions.
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_IMAGE = 1;
    KIND_FILE = 2;
    KIND_AUDIO = 3;
    KIND_VIDEO = 4;
    KIND_LINK = 5;
  }

  // Bounded-set error code surfaced by the attachment-downloader sidecar
  // when persistence fails. Empty/UNSPECIFIED on the gateway-publish path.
  // Downstream Message still flows; AI consumers should soft-handle
  // missing bytes when error_code != ATTACHMENT_OK.
  enum ErrorCode {
    ERROR_CODE_UNSPECIFIED = 0;
    ERROR_CODE_OK          = 1; // bytes persisted; storage_key + content_sha256 set
    ERROR_CODE_EXPIRED     = 2; // platform URL TTL elapsed before download
    ERROR_CODE_FORBIDDEN   = 3; // 401/403 from platform
    ERROR_CODE_NOT_FOUND   = 4; // 404 from platform
    ERROR_CODE_TOO_LARGE   = 5; // exceeded sidecar size cap
    ERROR_CODE_STORAGE     = 6; // backend write failed
    ERROR_CODE_TIMEOUT     = 7; // download exceeded deadline
  }

  Kind   kind     = 1;
  string url      = 2;
  string mime     = 3;
  int64  bytes    = 4;
  string filename = 5;

  // --- storage rewrite (set by attachment-downloader sidecar) ---
  // Stable object-storage key (e.g. "mio/attachments/zoho_cliq/yyyy=2026/.../{sha256}.png").
  // Empty until the sidecar persists bytes. Independent of `url` so consumers
  // that hold long-lived references can re-mint signed URLs from the key.
  string    storage_key    = 6;
  // SHA-256 of the persisted bytes (lowercase hex). Empty if not yet persisted.
  string    content_sha256 = 7;
  // Persistence outcome. ATTACHMENT_OK on success.
  ErrorCode error_code     = 8;
}
