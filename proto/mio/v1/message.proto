syntax = "proto3";

package mio.v1;

import "google/protobuf/timestamp.proto";
import "mio/v1/attachment.proto";
import "mio/v1/enums.proto";
import "mio/v1/sender.proto";

option go_package = "github.com/vanducng/mio/proto/gen/go/mio/v1;miov1";

// Message is the canonical inbound envelope published to MESSAGES_INBOUND.
// Every consumer (MIU AI service, sink-gcs, analytics) receives this shape.
//
// Design invariants (locked — do not change without a migration plan):
//   1. Four-tier addressing: tenant_id → account_id → conversation_id → id.
//      Both tenant_id and account_id are present from message #1.
//   2. channel_type is a string referencing proto/channels.yaml. Not an enum —
//      new channels are added to the registry without proto regeneration.
//   3. Idempotency key: (account_id, source_message_id). NOT (channel_type, source_message_id)
//      — the latter breaks for tenants running two workspaces of the same platform.
//   4. attributes map<string,string> is the only legal home for channel-specific data.
//      Promotion rule: any key read by ≥2 consumers OR written by ≥2 channels
//      gets promoted to a typed field. See CONTRIBUTING.md for details.
//      Use named constants (e.g. const AttrSlackTS = "slack_ts"), not string literals.
message Message {
  // --- identity ---
  string id             = 1; // mio UUID v7
  int32  schema_version = 2; // = 1; SDK rejects mismatch on publish

  // --- four-tier scope (foundation) ---
  string tenant_id    = 3;
  string account_id   = 4; // mio UUID for the channel install (accounts table)
  string channel_type = 5; // string from proto/channels.yaml registry

  // --- where (the conversation) ---
  string           conversation_id          = 6; // mio UUID
  string           conversation_external_id = 7; // platform-side opaque id
  ConversationKind conversation_kind        = 8;
  string           parent_conversation_id  = 9;  // empty unless thread / forum-post

  // --- idempotency + threading ---
  string source_message_id      = 10; // platform message id; (account_id, source_message_id) is unique
  string thread_root_message_id = 11; // empty if not in a Matrix-style thread

  // --- payload ---
  Sender              sender      = 12;
  string              text        = 13;
  repeated Attachment attachments = 14;

  // --- timing ---
  google.protobuf.Timestamp received_at = 15;

  // --- escape hatch ---
  // Channel-specific data lives here until it reaches the promotion threshold
  // (≥2 consumers OR ≥2 channels read the same key → promote to typed field).
  // Always use named constants, never string literals. See CONTRIBUTING.md.
  map<string, string> attributes = 16;

  // Reserved field numbers — do NOT reclaim without a migration plan.
  reserved 17; // reserved for MessageRelation (P5 outbound edit / reaction linkage)
  reserved 18; // reserved for is_summary (compaction flag, future)
}
