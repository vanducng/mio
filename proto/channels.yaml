# Channel type registry — P0 placeholder.
# Each entry maps a registry slug (underscore, used in NATS subjects, metric
# labels, GCS partitions, and code identifiers) to human metadata.
#
# Adding a channel requires:
#   1. An entry here (slug + display_name + status)
#   2. An adapter package under gateway/internal/channels/<slug>/
#   3. No proto regeneration, no SDK redeploy.
#
# Slugs use underscore by convention. Webhook URL slugs use hyphen (RFC 3986):
#   /webhooks/zoho-cliq  →  registry slug: zoho_cliq
#
# Populated in P1. First entry (zoho_cliq) lands with the gateway in P3.
channels: []
