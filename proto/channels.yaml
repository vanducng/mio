# proto/channels.yaml — Single source of truth for channel_type strings.
#
# Rules:
#   - channel_type on the wire is always the `name` field below (underscore form).
#   - Webhook URL slugs use hyphen (RFC 3986): /webhooks/zoho-cliq → slug: zoho_cliq
#   - CI rejects PRs that introduce a channel_type string not listed here.
#   - Renames go via deprecated_aliases ONLY — never UPDATE-in-place.
#     (Lesson: goclaw migration 58 — in-place rename broke 3 months of archived data.)
#   - New channels get an entry here first; the gateway adapter lands separately (P3+).
#
# status values: active | planned | deprecated
channel_types:
  - name: zoho_cliq
    status: active
  - name: slack
    status: planned
  - name: telegram
    status: planned
  - name: discord
    status: planned

# deprecated_aliases maps old slug → current slug.
# Add here when a channel is renamed; the SDK will accept both during migration.
# Example: zalo_oauth: zalo_oa
deprecated_aliases: {}
