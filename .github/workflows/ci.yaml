name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # ── Path filter ────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      sdk-py: ${{ steps.filter.outputs.sdk-py }}
      proto: ${{ steps.filter.outputs.proto }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'gateway/**'
              - 'sdk-go/**'
              - 'proto/gen/go/**'
              - 'go.mod'
              - 'go.sum'
            sdk-py:
              - 'sdk-py/**'
              - 'examples/echo-consumer/**'
              - 'proto/gen/py/**'
            proto:
              - 'proto/**'
              - 'buf.yaml'
              - 'buf.gen.yaml'
            helm:
              - 'deploy/charts/**'

  # ── Proto lint + breaking check ────────────────────────────────────────────
  test-proto:
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2
        with:
          cache: true

      - name: buf lint
        run: buf lint proto

      - name: buf breaking (skip on first PR with empty main)
        # Skip breaking check on the initial PR when origin/main has no proto files.
        if: github.base_ref == 'main' || github.ref == 'refs/heads/main'
        run: |
          buf breaking --against ".git#branch=main" proto || \
            echo "::warning::buf breaking check skipped or found no baseline (first PR?)"

  # ── Gateway + sdk-go tests ─────────────────────────────────────────────────
  test-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          cache: true

      - name: buf generate (proto/gen/* are gitignored)
        run: buf generate proto

      - name: golangci-lint
        run: |
          (cd gateway && golangci-lint run ./...)
          (cd sdk-go && golangci-lint run ./...)

      - name: go test (race detector)
        run: |
          (cd gateway && go test -race -cover ./...)
          (cd sdk-go && go test -race -cover ./...)

  # ── Python SDK + echo-consumer tests ──────────────────────────────────────
  test-python:
    needs: changes
    if: needs.changes.outputs.sdk-py == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          cache: true

      - name: buf generate (proto/gen/* are gitignored)
        run: buf generate proto

      - name: ruff lint + format check
        run: |
          ruff check sdk-py examples/echo-consumer
          ruff format --check sdk-py examples/echo-consumer

      - name: pytest sdk-py
        run: |
          cd sdk-py && uv run pytest tests/ -v -m "not integration"

      - name: pytest echo-consumer
        run: |
          uv run --project examples/echo-consumer pytest examples/echo-consumer/tests/ -v

  # ── Helm lint ──────────────────────────────────────────────────────────────
  helm-lint:
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.4"

      - name: Add NATS helm repo
        run: helm repo add nats https://nats-io.github.io/k8s/helm/charts/

      - name: helm dependency update (mio-nats)
        run: helm dependency update deploy/charts/mio-nats

      - name: helm lint all charts
        run: |
          helm lint deploy/charts/mio-nats
          helm lint deploy/charts/mio-jetstream-bootstrap
          helm lint deploy/charts/mio-gateway
          helm lint deploy/charts/mio-sink-gcs
          helm lint deploy/charts/mio-echo-consumer

      - name: helm template (render check)
        run: |
          helm template test-nats deploy/charts/mio-nats \
            --set nats.config.jetstream.fileStore.pvc.storageClassName=standard
          helm template test-bootstrap deploy/charts/mio-jetstream-bootstrap
          helm template test-gateway deploy/charts/mio-gateway \
            --set secrets.existingSecret=mio-gateway-secrets
          helm template test-sink-gcs deploy/charts/mio-sink-gcs \
            --set serviceAccount.gcpServiceAccount=mio-sink-gcs@example.iam.gserviceaccount.com
          helm template test-echo-consumer deploy/charts/mio-echo-consumer

  # ── Build + push gateway image (main push only) ────────────────────────────
  build-gateway:
    needs: [changes, test-gateway]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          cache: true

      - name: buf generate (proto/gen/* are gitignored)
        run: buf generate proto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: gateway/Dockerfile
          push: true
          # Tag policy: sha (always) + main (rolling) + semver (on git tag only).
          # Never floating :latest on non-tag pushes.
          tags: |
            ghcr.io/vanducng/mio/gateway:${{ github.sha }}
            ghcr.io/vanducng/mio/gateway:main
          # Registry cache (not gha cache — 10GB cap thrashes for two services).
          cache-from: type=registry,ref=ghcr.io/vanducng/mio/gateway:cache
          cache-to: type=registry,ref=ghcr.io/vanducng/mio/gateway:cache,mode=max
          platforms: linux/amd64

  # ── Build + push sink-gcs image (main push only) ──────────────────────────
  build-sink-gcs:
    needs: changes
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          cache: true

      - name: buf generate (proto/gen/* are gitignored)
        run: buf generate proto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sink-gcs
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sink-gcs/Dockerfile
          push: true
          tags: |
            ghcr.io/vanducng/mio/sink-gcs:${{ github.sha }}
            ghcr.io/vanducng/mio/sink-gcs:main
          cache-from: type=registry,ref=ghcr.io/vanducng/mio/sink-gcs:cache
          cache-to: type=registry,ref=ghcr.io/vanducng/mio/sink-gcs:cache,mode=max
          platforms: linux/amd64

  # ── Build + push echo-consumer image (main push only) ─────────────────────
  build-echo-consumer:
    needs: changes
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          cache: true

      - name: buf generate (proto/gen/* are gitignored)
        run: buf generate proto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push echo-consumer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: examples/echo-consumer/Dockerfile
          push: true
          tags: |
            ghcr.io/vanducng/mio/echo-consumer:${{ github.sha }}
            ghcr.io/vanducng/mio/echo-consumer:main
          cache-from: type=registry,ref=ghcr.io/vanducng/mio/echo-consumer:cache
          cache-to: type=registry,ref=ghcr.io/vanducng/mio/echo-consumer:cache,mode=max
          platforms: linux/amd64
